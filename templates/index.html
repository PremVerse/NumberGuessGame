<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number Game</title>

    <!-- Animate.css -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Your CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="bubbles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

    <div class="container">

        <h1>🎯 Guess The Number</h1>

        <p>I have selected a random number between <b>1 and 100</b>.</p>

        <h3>Select Difficulty</h3>

        <div class="difficulty">

            <button onclick="setDifficulty('easy')" class="easy">
                🟢 Easy (10 Attempts)
            </button>

            <button onclick="setDifficulty('medium')" class="medium">
                🟡 Medium (7 Attempts)
            </button>

            <button onclick="setDifficulty('hard')" class="hard">
                🔴 Hard (5 Attempts)
            </button>

        </div>

        <input
            type="number"
            id="guess"
            placeholder="Enter your guess">

        <button onclick="checkGuess()">
            Guess
        </button>

        <p>
            Attempts:
            <span id="attempts">0</span> /
            <span id="maxAttempts">10</span>
        </p>

        <p id="message" class="info">
            Start Guessing...
        </p>

        <button onclick="restartGame()">
            🔄 Restart Game
        </button>

        <div class="footer">
            Good Luck 🍀
        </div>

    </div>

<!-- Audio Files -->
<audio id="clickSound" src="{{ url_for('static', filename='sounds/click.mp3') }}"></audio>

<audio id="winSound" src="{{ url_for('static', filename='sounds/win.mp3') }}"></audio>

<audio id="wrongSound" src="{{ url_for('static', filename='sounds/wrong.mp3') }}"></audio>

<audio id="gameOverSound" src="{{ url_for('static', filename='sounds/gameover.mp3') }}"></audio>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<!-- Your JavaScript -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
